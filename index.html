<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated 2 Scientific</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <div class="speed-row">
        <button class="speed-btn" onclick="jsGrowth()">GROWTH</button>
        <button class="speed-btn" onclick="jsDecay()">DECAY</button>
        <button class="speed-btn" onclick="jsQuad()">QUAD</button>
        <button class="speed-btn" onclick="jsAngle()">ANGLE</button>
    </div>

    <div class="display" id="screen">0</div>

    <div class="grid">
        <button class="func" onclick="jsReset()">AC</button>
        <button class="func" onclick="jsToggle()">+/-</button>
        <button class="func" onclick="jsMath('sin')">sin</button>
        <button class="op" onclick="jsOp('/')">÷</button>

        <button class="num" onclick="jsNum(7)">7</button>
        <button class="num" onclick="jsNum(8)">8</button>
        <button class="num" onclick="jsNum(9)">9</button>
        <button class="op" onclick="jsOp('*')">×</button>

        <button class="num" onclick="jsNum(4)">4</button>
        <button class="num" onclick="jsNum(5)">5</button>
        <button class="num" onclick="jsNum(6)">6</button>
        <button class="op" onclick="jsOp('-')">−</button>

        <button class="num" onclick="jsNum(1)">1</button>
        <button class="num" onclick="jsNum(2)">2</button>
        <button class="num" onclick="jsNum(3)">3</button>
        <button class="op" onclick="jsOp('+')">+</button>

        <button class="num" onclick="jsMath('cos')">cos</button>
        <button class="num" onclick="jsNum(0)">0</button>
        <button class="num" onclick="jsMath('tan')">tan</button>
        <button class="op" onclick="jsEqual()">=</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
